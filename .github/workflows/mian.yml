name: ARM64 Build With Static Talloc (Android NDK)

"on":
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - ".github/workflows/mian.yml"

jobs:
  build-arm64-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make wget xz-utils qemu-user

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Export NDK Variables
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          TARGET="aarch64-linux-android28"
          
          echo "CC=$TOOLCHAIN/bin/$TARGET-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/$TARGET-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV
          echo "OBJCOPY=$TOOLCHAIN/bin/llvm-objcopy" >> $GITHUB_ENV
          echo "OBJDUMP=$TOOLCHAIN/bin/llvm-objdump" >> $GITHUB_ENV
          echo "LD=$TOOLCHAIN/bin/$TARGET-clang" >> $GITHUB_ENV

      - name: Build ARM64 Android libtalloc.a
        run: |
          set -euxo pipefail

          mkdir -p /tmp/libtalloc_check
          cd /tmp/libtalloc_check

          wget -q -O talloc-2.4.3.tar.gz https://www.samba.org/ftp/talloc/talloc-2.4.3.tar.gz
          tar -xf talloc-2.4.3.tar.gz

          cat > /tmp/libtalloc_check/talloc_cross_answers.txt <<'EOF'
          Checking uname sysname type: "Linux"
          Checking uname machine type: "aarch64"
          Checking uname release type: "6.6"
          Checking uname version type: "#1"
          rpath library support: NO
          -Wl,--version-script support: OK
          Checking getconf LFS_CFLAGS: ""
          Checking for large file support without additional flags: OK
          Checking for -D_FILE_OFFSET_BITS=64: NO
          Checking for -D_LARGE_FILES: NO
          Checking getconf large file support flags work: OK
          Checking correct behavior of strtoll: OK
          Checking for working strptime: OK
          Checking for C99 vsnprintf: "1"
          Checking for HAVE_SHARED_MMAP: OK
          Checking for HAVE_MREMAP: OK
          Checking for HAVE_INCOHERENT_MMAP: NO
          Checking for HAVE_SECURE_MKSTEMP: OK
          EOF

          cd talloc-2.4.3

          ./configure \
            --disable-python \
            --cross-compile \
            --cross-answers=/tmp/libtalloc_check/talloc_cross_answers.txt \
            --hostcc=gcc \
            --prefix=/tmp/libtalloc_check/talloc-install-aarch64
            
          make -j"$(nproc)"
          make install

          mkdir -p /tmp/libtalloc_check/talloc-static-aarch64

          $CC \
            -c talloc.c \
            -O2 -fPIC \
            -D_FILE_OFFSET_BITS=64 -D_GNU_SOURCE -D__STDC_WANT_LIB_EXT1__=1 \
            -I. -Ilib/replace -Ibin/default \
            -o /tmp/libtalloc_check/talloc-static-aarch64/talloc.o

          $AR rcs \
            /tmp/libtalloc_check/talloc-install-aarch64/lib/libtalloc.a \
            /tmp/libtalloc_check/talloc-static-aarch64/talloc.o

          $RANLIB /tmp/libtalloc_check/talloc-install-aarch64/lib/libtalloc.a

      - name: Patch GNUmakefile for CI linker compatibility
        run: |
          set -euxo pipefail
          sed -i 's/,--rosegment//g' src/GNUmakefile

      - name: Build proot and proot-loader (Android NDK, Mixed Linking)
        run: |
          set -euxo pipefail

          cd src
          make clean

          make \
            CC="$CC" \
            LD="$LD" \
            AR="$AR" \
            STRIP="$STRIP" \
            OBJCOPY="$OBJCOPY" \
            OBJDUMP="$OBJDUMP" \
            HAS_LOADER_32BIT= \
            CPPFLAGS='-D__ANDROID__ -DASHMEM_NAME_LEN=256 -DASHMEM_SET_NAME=0x40047701 -Wno-deprecated-declarations -D_FILE_OFFSET_BITS=64 -D_GNU_SOURCE -I. -I./ -I/tmp/libtalloc_check/talloc-install-aarch64/include' \
            LDFLAGS='-L/tmp/libtalloc_check/talloc-install-aarch64/lib -Wl,-Bstatic -ltalloc -Wl,-Bdynamic -Wl,-z,noexecstack' \
            -j"$(nproc)"

          # loader 是 proot 用来在 Android 高版本绕过 execve 拦截的关键组件
          # make 完成后它在 loader/loader，需要重命名为 proot-loader 方便使用
          cp loader/loader proot-loader
          echo "--- proot binary ---"
          file proot
          echo "--- proot-loader binary ---"
          file proot-loader

      - name: Verify binary and linkage
        run: |
          set -euxo pipefail
          READELF="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"

          echo "=== proot NEEDED ==="
          "$READELF" -d src/proot | grep NEEDED || echo "No dynamic deps!"

          echo "=== proot-loader NEEDED ==="
          "$READELF" -d src/proot-loader | grep NEEDED || echo "No dynamic deps!"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proot-android-aarch64
          path: |
            src/proot
            src/proot-loader
